<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Clock</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
        overflow: hidden;
      }

      /* Background Animation */
      body::before {
        content: "";
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: rgba(0, 255, 255, 0.2);
        filter: blur(100px);
        animation: move 8s infinite alternate;
      }

      @keyframes move {
        from {
          transform: translate(-200px, -100px);
        }
        to {
          transform: translate(200px, 100px);
        }
      }

      .container {
        text-align: center;
        color: white;
        z-index: 1;
      }

      /* Analog Clock */

      .clock {
        width: 300px;
        height: 300px;
        border: 8px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        position: relative;
        margin: auto;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
        animation: float 3s infinite ease-in-out;
      }

      @keyframes float {
        50% {
          transform: translateY(-10px);
        }
      }

      .center {
        width: 15px;
        height: 15px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .hand {
        position: absolute;
        bottom: 50%;
        left: 50%;
        transform-origin: bottom;
        transform: translateX(-50%);
        border-radius: 10px;
      }

      .hour {
        width: 6px;
        height: 80px;
        background: #00ffff;
      }

      .minute {
        width: 4px;
        height: 110px;
        background: #fff;
      }

      .second {
        width: 2px;
        height: 125px;
        background: red;
      }

      /* Numbers */

      .number {
        position: absolute;
        color: white;
        font-size: 22px;
        font-weight: bold;
      }

      .n12 {
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
      }
      .n3 {
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
      }
      .n6 {
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
      }
      .n9 {
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
      }

      /* Digital Clock */

      .digital {
        margin-top: 30px;
        font-size: 2rem;
        font-weight: bold;
        letter-spacing: 3px;
        animation: glow 1s infinite alternate;
      }

      @keyframes glow {
        from {
          text-shadow: 0 0 5px cyan;
        }
        to {
          text-shadow:
            0 0 20px cyan,
            0 0 40px cyan;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="clock">
        <div class="number n12">12</div>
        <div class="number n3">3</div>
        <div class="number n6">6</div>
        <div class="number n9">9</div>

        <div class="hand hour" id="hour"></div>
        <div class="hand minute" id="minute"></div>
        <div class="hand second" id="second"></div>

        <div class="center"></div>
      </div>

      <div class="digital" id="digitalClock">00:00:00</div>
    </div>

    <script>
      const hourHand = document.getElementById("hour");
      const minuteHand = document.getElementById("minute");
      const secondHand = document.getElementById("second");
      const digitalClock = document.getElementById("digitalClock");

      function updateClock() {
        const now = new Date();

        const hours = now.getHours();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();

        const hourDeg = (hours % 12) * 30 + minutes * 0.5;
        const minuteDeg = minutes * 6;
        const secondDeg = seconds * 6;

        hourHand.style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
        minuteHand.style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
        secondHand.style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;

        const ampm = hours >= 12 ? "PM" : "AM";
        const hour12 = hours % 12 === 0 ? 12 : hours % 12;

        digitalClock.innerHTML = `${String(hour12).padStart(2, "0")} : ${String(minutes).padStart(2, "0")} : ${String(seconds).padStart(2, "0")} ${ampm}`;
      }

      /* setInterval */
      setInterval(updateClock, 1000);

      /* Initial Call */
      updateClock();

      /* setTimeout */
      setTimeout(() => {
        digitalClock.style.color = "cyan";
      }, 3000);
    </script>
  </body>
</html>
